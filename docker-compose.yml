services:
  app:
    build: .
    image: ai-trend-radar:latest
    env_file:
      - .env
    environment:
      PORT: 8501
    ports:
      - "8501:8501"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; port=os.environ.get('PORT', '8501'); urllib.request.urlopen(f'http://127.0.0.1:{port}/_stcore/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
